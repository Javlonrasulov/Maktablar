[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Keep /api/* ahead of SPA fallback, and preserve path via :splat
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
